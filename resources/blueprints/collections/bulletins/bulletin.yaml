title: Bulletin
tabs:
  main:
    display: Main
    sections:
      - fields:
          - handle: title
            field:
              type: text
              required: true
              display: Title
              instructions: "e.g. Sunday Bulletin – 16 March 2026"
              localizable: false
              validate:
                - required
          - handle: date
            field:
              type: date
              required: true
              default: now
              display: "Bulletin Date"
              localizable: false
              validate:
                - required
          - handle: pdf_file
            field:
              type: assets
              display: "PDF File"
              container: resources
              accepted_mimetypes:
                - application/pdf
              max_files: 1
              instructions: "Upload the bulletin PDF here."
              localizable: false
          - handle: content
            field:
              type: bard
              display: Content
              instructions: "Optionally add announcements or text content directly."
              buttons:
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - heading
                - link
              localizable: false
  sidebar:
    display: Sidebar
    sections:
      - fields:
          - handle: slug
            field:
              type: slug
              localizable: true
              validate: "max:200"
