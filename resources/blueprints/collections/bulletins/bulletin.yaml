title: Bulletin
fields:
  -
    handle: title
    field:
      type: text
      display: Title
      instructions: "e.g. Sunday Bulletin – 16 March 2026"
      required: true
  -
    handle: date
    field:
      type: date
      display: Bulletin Date
      required: true
  -
    handle: pdf_file
    field:
      type: assets
      display: PDF File
      container: assets
      accepted_mimetypes:
        - application/pdf
      max_files: 1
      instructions: Upload the bulletin PDF here.
  -
    handle: content
    field:
      type: bard
      display: Content
      instructions: Optionally add announcements or text content directly.
      buttons:
        - bold
        - italic
        - unorderedlist
        - orderedlist
        - heading
        - link
