title: Trio Walk
fields:
  - handle: title
    field:
      type: text
      display: Title
      required: true
  - handle: date
    field:
      type: date
      display: Date
      required: true
  - handle: description
    field:
      type: textarea
      display: Description
  - handle: audio_en
    field:
      type: assets
      display: Audio (English)
      container: assets
      accepted_mimetypes:
        - audio/mpeg
        - audio/mp4
        - audio/wav
      max_files: 1
      instructions: Upload the English MP3 here.
  - handle: audio_cn
    field:
      type: assets
      display: Audio (Chinese)
      container: assets
      accepted_mimetypes:
        - audio/mpeg
        - audio/mp4
        - audio/wav
      max_files: 1
      instructions: Upload the Chinese MP3 here.
  - handle: transcript_en
    field:
      type: textarea
      display: Transcript EN (JSON)
      instructions: Auto-populated by transcription job. Do not edit manually.
  - handle: transcript_cn
    field:
      type: textarea
      display: Transcript CN (JSON)
      instructions: Auto-populated by transcription job. Do not edit manually.
  - handle: transcription_status_en
    field:
      type: text
      display: Transcription Status (EN)
      instructions: Auto-updated by system.
  - handle: transcription_status_cn
    field:
      type: text
      display: Transcription Status (CN)
      instructions: Auto-updated by system.
