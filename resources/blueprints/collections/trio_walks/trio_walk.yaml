title: Trio Walk
fields:
  - handle: title
    field:
      type: text
      display: Title
      required: true
  - handle: date
    field:
      type: date
      display: Date
      required: true
  - handle: week_number
    field:
      type: integer
      display: Week Number
      instructions: e.g. 1, 2, 3
  - handle: scripture_reference
    field:
      type: text
      display: Scripture Reference
      instructions: e.g. 1 John 1:5–7
  - handle: preview_text
    field:
      type: textarea
      display: Preview Text
      instructions: Short teaser shown on the home page block. 1-2 sentences max.
  - handle: audio_en
    field:
      type: assets
      display: Audio (English)
      container: resources
      accepted_mimetypes:
        - audio/mpeg
        - audio/mp4
        - audio/wav
      max_files: 1
  - handle: audio_cn
    field:
      type: assets
      display: Audio (Chinese)
      container: resources
      accepted_mimetypes:
        - audio/mpeg
        - audio/mp4
        - audio/wav
      max_files: 1
  - handle: content_en
    field:
      type: bard
      display: Devotional Content (English)
      instructions: Main devotional body text.
      buttons:
        - bold
        - italic
        - heading
        - orderedlist
        - unorderedlist
  - handle: prayer_en
    field:
      type: textarea
      display: Prayer (English)
      instructions: The closing prayer.
  - handle: discussion_en
    field:
      type: bard
      display: Discussion Questions (English)
      instructions: Numbered discussion questions.
      buttons:
        - bold
        - orderedlist
  - handle: content_cn
    field:
      type: bard
      display: Devotional Content (Chinese)
      buttons:
        - bold
        - italic
        - heading
        - orderedlist
        - unorderedlist
  - handle: prayer_cn
    field:
      type: textarea
      display: Prayer (Chinese)
  - handle: discussion_cn
    field:
      type: bard
      display: Discussion Questions (Chinese)
      buttons:
        - bold
        - orderedlist
  - handle: transcript_en
    field:
      type: assets
      display: Transcript (English VTT)
      container: resources
      accepted_mimetypes:
        - text/vtt
      max_files: 1

  - handle: transcript_cn
    field:
      type: assets
      display: Transcript (Chinese VTT)
      container: resources
      accepted_mimetypes:
        - text/vtt
      max_files: 1
