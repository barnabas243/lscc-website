title: Trio Walk
fields:
  - handle: title
    field:
      type: text
      display: Title
      required: true
  - handle: date
    field:
      type: date
      display: Date
      required: true
  - handle: day_number
    field:
      type: integer
      display: Day Number
      instructions: e.g. 1, 2, 3
  - handle: scripture_reference
    field:
      type: text
      display: Scripture Reference
      instructions: e.g. 1 John 1:5–7
  - handle: audio_en
    field:
      type: assets
      display: Audio (English)
      container: resources
      accepted_mimetypes:
        - audio/mpeg
        - audio/mp4
        - audio/wav
      max_files: 1
  - handle: audio_cn
    field:
      type: assets
      display: Audio (Chinese)
      container: resources
      accepted_mimetypes:
        - audio/mpeg
        - audio/mp4
        - audio/wav
      max_files: 1
  - handle: transcript_en
    field:
      type: bard
      display: Script (English)
      instructions: Paste the English script here. Each paragraph will become a sentence block.
      buttons:
        - bold
        - italic
  - handle: transcript_cn
    field:
      type: bard
      display: Script (Chinese)
      instructions: Paste the Chinese script here.
      buttons:
        - bold
        - italic
