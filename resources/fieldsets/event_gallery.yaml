title: Event Gallery
fields:
  - handle: title
    field:
      type: text
      display: Section Title
      default: "Event Gallery"
  - handle: count
    field:
      type: integer
      display: Number of Events to Show
      default: 6
  - handle: show_all_link
    field:
      type: toggle
      display: Show "See all events" link?
      default: true
